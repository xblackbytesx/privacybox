  #     - traefik.http.routers.element-call-secure.middlewares=https-redirect@file,non-www@file,secure-headers@file,gzip-compress@file
  #     - traefik.http.services.element-call.loadbalancer.server.port=8080
  #   restart: unless-stopped

  synapse-livekit:
    container_name: synapse-livekit
    image: livekit/livekit-server:latest
    security_opt:
      - no-new-privileges:true
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "7881:7881/tcp" # WebRTC control (direct — not via Traefik)
      - "51000-52000:51000-52000/udp" # Media relay (must bypass Traefik — UDP)
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.synapse-livekit-secure.entrypoints=websecure
      - traefik.http.routers.synapse-livekit-secure.rule=Host(`${SUBDOMAIN:+${SUBDOMAIN}.}${DOMAIN}`) && PathPrefix(`/livekit/sfu`)
      - traefik.http.routers.synapse-livekit-secure.tls=true
      - traefik.http.routers.synapse-livekit-secure.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.routers.synapse-livekit-secure.service=synapse-livekit-svc
      - traefik.http.middlewares.synapse-livekit-strip.stripprefix.prefixes=/livekit/sfu
      - traefik.http.routers.synapse-livekit-secure.middlewares=https-redirect@file,secure-headers@file,synapse-livekit-strip
      - traefik.http.services.synapse-livekit-svc.loadbalancer.server.port=7880
    restart: unless-stopped

  synapse-lk-jwt:
    container_name: synapse-lk-jwt
    image: ghcr.io/element-hq/lk-jwt-service:latest
    security_opt:
      - no-new-privileges:true
    environment:
      - LIVEKIT_URL=wss://${SUBDOMAIN:+${SUBDOMAIN}.}${DOMAIN}/livekit/sfu
      - LIVEKIT_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_JWT_BIND=0.0.0.0:8080
      - LIVEKIT_FULL_ACCESS_HOMESERVERS=${SUBDOMAIN:+${SUBDOMAIN}.}${DOMAIN}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      synapse-livekit:
        condition: service_started
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.synapse-lk-jwt-secure.entrypoints=websecure
      - traefik.http.routers.synapse-lk-jwt-secure.rule=Host(`${SUBDOMAIN:+${SUBDOMAIN}.}${DOMAIN}`) && PathPrefix(`/livekit/jwt`)
      - traefik.http.routers.synapse-lk-jwt-secure.tls=true
      - traefik.http.routers.synapse-lk-jwt-secure.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.routers.synapse-lk-jwt-secure.service=synapse-lk-jwt-svc
      - traefik.http.middlewares.synapse-lk-jwt-strip.stripprefix.prefixes=/livekit/jwt
      - traefik.http.routers.synapse-lk-jwt-secure.middlewares=https-redirect@file,secure-headers@file,gzip-compress@file,synapse-lk-jwt-strip
      - traefik.http.services.synapse-lk-jwt-svc.loadbalancer.server.port=8080
    restart: unless-stopped

  synapse-app:
    container_name: synapse-app
    image: matrixdotorg/synapse:latest
    security_opt:
      - no-new-privileges:true
    volumes:
      - synapse-data:/data
      - synapse-media:/media_store
      - /etc/localtime:/etc/localtime:ro
    environment:
      - UID=${PUID}
      - GID=${PGID}
      - TZ=${TIMEZONE}
      - SYNAPSE_SERVER_NAME=${SUBDOMAIN:+${SUBDOMAIN}.}${DOMAIN}
      - SYNAPSE_REPORT_STATS=no
      - POSTGRES_HOST=synapse-db
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=${DB_USER_PASS}
      - POSTGRES_DB=synapse
      - SYNAPSE_REDIS_HOST=synapse-redis
      - SYNAPSE_REDIS_PORT=6379
    depends_on:
      synapse-db:
        condition: service_healthy
      synapse-redis:
        condition: service_healthy
      synapse-coturn:
        condition: service_started
      synapse-well-known:
        condition: service_started
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.synapse-app-secure.entrypoints=websecure
      - traefik.http.routers.synapse-app-secure.rule=Host(`${SUBDOMAIN:+${SUBDOMAIN}.}${DOMAIN}`) && (PathPrefix(`/_matrix`) || PathPrefix(`/_synapse`))
      - traefik.http.routers.synapse-app-secure.tls=true
      - traefik.http.routers.synapse-app-secure.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.routers.synapse-app-secure.service=synapse-app
      - traefik.http.routers.synapse-app-secure.middlewares=https-redirect@file,non-www@file,secure-headers@file,gzip-compress@file
      - traefik.http.services.synapse-app.loadbalancer.server.port=8008
    restart: unless-stopped

