# llama-swap model definitions (mounted at /app/config.yaml).
#
# Default routing loads ONE model at a time and unloads the previous one on swap —
# correct for the 12GB B580. `ttl` additionally unloads a model after N idle seconds,
# freeing the GPU for other services. ${PORT} is auto-assigned by llama-swap per model.

# Allow up to 5 min for a model to become ready — the `smart` model loads ~22GB
# (--no-mmap) into RAM before serving, which can take a while on first start.
healthCheckTimeout: 300
logLevel: info

models:
  # Fast, fully-GPU model for quick chats AND Deep Research orchestration.
  # Deep Research fires many short LLM calls with tight (some hardcoded 60s) timeouts,
  # so it needs a fast responder, not a smart-but-slow one. Point Odysseus's research
  # model at "fast".
  #
  # Qwen3-4B-Instruct-2507: a DEDICATED NON-THINKING model — it never emits <think>
  # blocks, so it answers immediately instead of "overthinking" simple questions (and
  # generates far fewer tokens, which also keeps research calls inside their timeouts).
  # We use this instead of the hybrid Qwen3.5-4B because llama.cpp's thinking-disable
  # switches (--reasoning-budget 0 / enable_thinking:false) are currently buggy for the
  # Qwen3.5 series. It's the 3.0 generation rather than 3.6, but still the same Qwen3.x
  # family (same chat template / tokenizer / tool-calling format as `smart`).
  # 4B fully on the GPU = very fast prefill; Q8_0 since a 4B is tiny and VRAM is ample.
  "fast":
    name: "Qwen3-4B-Instruct (fast, no-think)"
    ttl: 300
    cmd: >
      /app/llama-server
      -m /models/Qwen3-4B-Instruct-2507-Q8_0.gguf
      --host 127.0.0.1 --port ${PORT}
      -ngl 99
      -c 32768
      -b 2048
      --no-mmap
      -fa off

  # Smart MoE model for deep chat. 35B total / ~3B active; experts offloaded to RAM
  # via --n-cpu-moe. Slower per token + slow prefill — great for quality chat, poor
  # for the many-call Deep Research loop (use "fast" there).
  "smart":
    name: "Qwen3.6-35B-A3B (smart)"
    ttl: 300
    cmd: >
      /app/llama-server
      -m /models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
      --host 127.0.0.1 --port ${PORT}
      -ngl 99
      --n-cpu-moe 32
      -t 6
      -c 32768
      -b 2048
      --no-mmap
      -fa off
