name: llamacpp-qwen36

# Model: Qwen3.6-35B-A3B (MoE: 35B total, ~3B active/token, 256 experts).
# Strategy: full layer offload (-ngl 99) then push the expert FFN tensors back to
#   CPU/RAM (--n-cpu-moe). Only the attention + shared expert + KV stay on the GPU,
#   so it runs on a 12GB card with the experts living in system RAM (~20GB at Q4).
# Context: cheap. The hybrid Gated DeltaNet linear attention means only ~10/40
#   layers keep a real KV cache, so 32K is trivial and 64K+ is feasible.
# Flash attention: OFF. Mostly irrelevant here (most layers are linear attention)
#   and flaky on Arc B580 Vulkan regardless.
# Needs a recent llama.cpp build for the Qwen3.6 arch — keep this image current.

volumes:
  llamacpp-qwen36-models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/llamacpp/models

services:
  llamacpp-qwen36:
    container_name: llamacpp-qwen36
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    security_opt:
      - no-new-privileges:true
      - label:disable
    ipc: host
    shm_size: 4g
    volumes:
      - llamacpp-qwen36-models:/models
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/dri:/dev/dri
    # environment:
    #   - VK_LOADER_DEBUG=error
    ports:
      - "11437:8080"
    command: [
        # unsloth dynamic UD-Q4_K_XL build — better quality for ~0.3GB more than
        # vanilla Q4_K_M. Match this filename to the GGUF in your models dir.
        "-m",
        "/models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        # Offload all layers to the GPU...
        "-ngl",
        "99",
        # ...then keep the expert FFN tensors on the CPU so it fits 12GB VRAM.
        # Tune: raise if the GPU OOMs, lower if VRAM has headroom.
        "--n-cpu-moe",
        "32",
        # Experts run on the CPU, so thread count matters. 6 = physical cores;
        # leaves SMT/headroom for ZFS and other containers.
        "-t",
        "6",
        # 32K context — cheap thanks to linear attention; can raise to 65536+ later.
        "-c",
        "32768",
        "-b",
        "2048",
        # Keep the experts resident in RAM for consistent speed (~20GB committed).
        # Drop this to let them be page-cache-backed/evictable if you'd rather not
        # commit the RAM (slightly less consistent inference speed).
        "--no-mmap",
        # Off — see header note; flash attention is moot for this architecture.
        "-fa",
        "off",
        # HTTP request timeout in seconds (NOT an idle model-unload).
        "--timeout",
        "300",
      ]
    deploy:
      resources:
        limits:
          # Experts execute on the CPU, so give it cores; experts + KV + overhead
          # need ~24-28GB of RAM (ARC lives in the host kernel, not this cgroup).
          cpus: "10.0"
          memory: 28G
    restart: unless-stopped
