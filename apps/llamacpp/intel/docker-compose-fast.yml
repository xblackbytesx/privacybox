name: llamacpp-fast

# Model: Qwen3-4B-Instruct-2507 (a dedicated NON-THINKING 4B — never emits <think>).
# Quick, fully-GPU model: fast prefill, snappy replies. This is the standalone twin of
# the `fast` entry in llama-swap-config.yaml — run THIS or llama-swap, not both (they'd
# collide on the GPU; this also reuses the same models dir).
# Flash attention: explicitly OFF (flaky on Arc B580 Vulkan). KV cache: f16 (default).

volumes:
  llamacpp-fast-models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/llamacpp/models

services:
  llamacpp-fast:
    container_name: llamacpp-fast
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    security_opt:
      - no-new-privileges:true
      - label:disable
    ipc: host
    shm_size: 4g
    volumes:
      - llamacpp-fast-models:/models
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/dri:/dev/dri
    # environment:
    #   - VK_LOADER_DEBUG=error
    ports:
      - "11438:8080"
    command: [
        "-m",
        "/models/Qwen3-4B-Instruct-2507-Q8_0.gguf",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        # Full GPU offload — 4B Q8_0 (~4.3GB) fits easily in 12GB VRAM.
        "-ngl",
        "99",
        # 32K context — a 4B leaves ample VRAM for the KV cache.
        "-c",
        "32768",
        "-b",
        "2048",
        # --no-mmap can help with stability on Vulkan.
        "--no-mmap",
        # Explicitly off — flash attention is unstable on Arc B580 Vulkan.
        "-fa",
        "off",
        # HTTP request timeout in seconds (NOT an idle model-unload).
        "--timeout",
        "300",
      ]
    deploy:
      resources:
        limits:
          # Fully GPU-offloaded 4B; CPU near-idle, modest RAM.
          cpus: "6.0"
          memory: 12G
    restart: unless-stopped
