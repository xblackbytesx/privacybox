name: llamacpp-gemma4

# Model: gemma-4-E4B-it-Q8_0 (Gemma 4 E4B Instruct)
# VRAM: ~4.3GB weights + f16 KV cache @ 32K — fits B580 12GB with ample headroom.
# Flash attention: explicitly OFF — flaky/unsupported on Intel Arc B580 Vulkan.
# KV cache: f16 (default). NOTE: quantized KV (--cache-type-v) requires flash
#   attention, so it cannot be used while -fa is off. f16 is cheap for a 4B anyway.

volumes:
  llamacpp-gemma4-models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/llamacpp/models

services:
  llamacpp-gemma4:
    container_name: llamacpp-gemma4
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    security_opt:
      - no-new-privileges:true
      - label:disable
    ipc: host
    shm_size: 4g
    volumes:
      - llamacpp-gemma4-models:/models
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/dri:/dev/dri
    # environment:
    #   - VK_LOADER_DEBUG=error
    ports:
      - "11435:8080"
    command: [
        "-m",
        "/models/google_gemma-4-E4B-it-Q8_0.gguf",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        # Full GPU offload — 4B Q8_0 (~4.3GB) fits easily in 12GB VRAM.
        "-ngl",
        "99",
        # 32K context — low model weight leaves plenty of VRAM for the KV cache.
        "-c",
        "32768",
        "-b",
        "2048",
        # --no-mmap can help with stability on Vulkan.
        "--no-mmap",
        # Explicitly off — flash attention is unstable on Arc B580 Vulkan.
        # (Leaving it unset lets llama.cpp auto-enable it, which then conflicts
        # with quantized KV and is flaky on this GPU.)
        "-fa",
        "off",
        # HTTP request timeout in seconds (NOT an idle model-unload — llama-server
        # keeps the model resident. Use llama-swap if you want idle unloading).
        "--timeout",
        "300",
      ]
    deploy:
      resources:
        limits:
          # Fully GPU-offloaded, so the CPU is near-idle; no need to reserve much.
          cpus: "6.0"
          memory: 12G
    restart: unless-stopped
