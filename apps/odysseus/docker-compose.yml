name: odysseus

networks:
  proxy:
    name: proxy
    external: true
  internal:
    internal: true

volumes:
  odysseus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/odysseus/data
  odysseus-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/odysseus/logs
  odysseus-ssh:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/odysseus/data/ssh
  odysseus-huggingface:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/odysseus/data/huggingface
  odysseus-local:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/odysseus/data/local
  odysseus-chromadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/odysseus/chromadb

services:
  odysseus-chromadb:
    container_name: odysseus-chromadb
    image: chromadb/chroma:latest
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - odysseus-chromadb:/chroma/chroma
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=false"
    restart: unless-stopped

  odysseus-app:
    container_name: odysseus-app
    image: ghcr.io/pewdiepie-archdaemon/odysseus:latest
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - proxy
    # extra_hosts:
    #   # Lets the container reach services on the Docker host, e.g. Ollama at
    #   # http://host.docker.internal:11434.
    #   - "host.docker.internal:host-gateway"
    environment:
      - LLM_HOST=${LLM_HOST:-localhost}
      - LLM_HOSTS=${LLM_HOSTS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - RESEARCH_LLM_ENDPOINT=${RESEARCH_LLM_ENDPOINT:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - SEARXNG_INSTANCE=${SEARXNG_INSTANCE:-}
      - CHROMADB_HOST=odysseus-chromadb
      - CHROMADB_PORT=8000
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - LOCALHOST_BYPASS=${LOCALHOST_BYPASS:-false}
      - ODYSSEUS_ADMIN_USER=${ODYSSEUS_ADMIN_USER:-admin}
      - ODYSSEUS_ADMIN_PASSWORD=${ODYSSEUS_ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
      - EMBEDDING_URL=${EMBEDDING_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - FASTEMBED_MODEL=${FASTEMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - FASTEMBED_CACHE_PATH=${FASTEMBED_CACHE_PATH:-}
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-24}
      - ODYSSEUS_INPROCESS_POLLERS=${ODYSSEUS_INPROCESS_POLLERS:-1}
      - ODYSSEUS_INPROCESS_TASKS=${ODYSSEUS_INPROCESS_TASKS:-1}
      - ODYSSEUS_SCRIPT_HOST=${ODYSSEUS_SCRIPT_HOST:-localhost}
      - ODYSSEUS_CHAT_UPLOAD_MAX_BYTES=${ODYSSEUS_CHAT_UPLOAD_MAX_BYTES:-10485760}
      - DATA_BRAVE_API_KEY=${DATA_BRAVE_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_PSE_CX=${GOOGLE_PSE_CX:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - odysseus-data:/app/data
      - odysseus-logs:/app/logs
      - odysseus-ssh:/app/.ssh
      - odysseus-huggingface:/app/.cache/huggingface
      - odysseus-local:/app/.local
      - /etc/localtime:/etc/localtime:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.odysseus-app-secure.entrypoints=websecure
      - traefik.http.routers.odysseus-app-secure.rule=Host(`${SUBDOMAIN}.${DOMAIN}`)
      - traefik.http.routers.odysseus-app-secure.tls=true
      - traefik.http.routers.odysseus-app-secure.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.routers.odysseus-app-secure.service=odysseus-app
      - traefik.http.routers.odysseus-app-secure.middlewares=https-redirect@file,non-www@file,secure-headers@file,gzip-compress@file
      - traefik.http.services.odysseus-app.loadbalancer.server.port=7000
    depends_on:
      odysseus-chromadb:
        condition: service_started
    restart: unless-stopped
