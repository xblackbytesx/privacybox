name: tailscale-client

volumes:
  tailscale-state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/tailscale-client/state

services:
  tailscale:
    container_name: "tailscale"
    image: "tailscale/tailscale:v1.96"
    hostname: "${TS_HOSTNAME}"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--login-server=${TS_LOGIN_SERVER} --accept-routes
      - TS_ROUTES=${TS_ROUTES}
    restart: unless-stopped
